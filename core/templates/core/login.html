{% extends 'core/base.html' %}

{% block title %}Iniciar Sesión | ArtCommissions{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-4">
        <div class="card card-arte shadow p-4 border-0">
            <div class="text-center mb-4">
                <i class="fa-solid fa-circle-user fa-3x mb-3" style="color: var(--ac-purple);"></i>
                <h3 class="fw-bold">Bienvenido de Vuelta</h3>
                <p class="text-muted small">Ingresa para ver tus comisiones</p>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    {{ form.as_p }}
                </div>
                
                <button type="submit" class="btn btn-ac-primary w-100 mt-2">
                    Entrar
                </button>
            </form>
            
            <div class="text-center mt-4">
                <span class="text-muted small">¿Aún no tienes cuenta?</span>
                <a href="{% url 'registro' %}" class="fw-bold" style="color: var(--ac-purple); text-decoration: none;">Regístrate</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
