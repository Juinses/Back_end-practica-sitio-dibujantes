{% extends 'core/base.html' %}

{% block title %}Publicar Nueva Obra | ArtCommissions{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6">
        <div class="card card-arte shadow-sm p-4 border-0">
            <h3 class="fw-bold text-center mb-4"><i class="fa-solid fa-upload me-2" style="color: var(--ac-purple);"></i>Subir Arte</h3>
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Título</label>
                    {{ form.titulo }}
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Imagen de la Obra</label>
                    {{ form.imagen }}
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Descripción</label>
                    {{ form.descripcion }}
                </div>
                
                <button type="submit" class="btn btn-ac-primary w-100">Publicar Obra</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
